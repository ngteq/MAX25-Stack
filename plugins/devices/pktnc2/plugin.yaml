id: pktnc2
type: device
parent_stack: MainAX25-Stack (MAX25-Stack)
hardware: tncs
label: PK-TNC2 / TNC-2 (TheFirmware)
status: planned

hybbx:
  plugin: packet_radio
  profile: tnc2
  aliases: [pktnc2, pk-tnc2, tapr, thefirmware]
  protocol: kiss
  serial_line: 8n1
  kiss_entry: auto

serial:
  default_device: /dev/ttyUSB0
  default_baud: 9600

rf:
  radio_baud: 1200
  band: cb

scripts:
  boot_wait: stacks/tncs/pktnc2-boot-wait.sh
  probe: stacks/tncs/tnc2c-probe

ini:
  - stacks/tncs/research/hybbx/hybbx-stabo-pk2.ini
  - share/hybbx/pktnc2-edge.ini.example

docs:
  - stacks/tncs/docs/TNC-INVENTORY.md

notes: >
  Unit B (Stabo XM6012 + PK-TNC2) — delivery expected.
  Reuses TNC2C probe/find tools; dedicated boot-wait script present.
