id: modems
type: hardware
parent_stack: MainAX25-Stack (MAX25-Stack)
label: Modems
description: BayCom/based SER12 via bcpr (userspace); USB/async KISS via baycom-kiss

stack_path: stacks/bcpr
hybbx_plugin: baycom

backends:
  - bcpr-ser12
  - kiss-serial

build:
  cmake_option: MAX25_BUILD_BCPR
  targets: [bcprd, bcpr-ctl]

ctl: stacks/bcpr/tools/bcpr-ctl

runtime:
  state_dir: /tmp/bcpr
  config: /etc/max25/bcpr.ini
  kiss_default: /tmp/bcpr/kiss-bc0

devices:
  - baycom-kiss
# SER12 product devices are max25e0 / max25e0:bc1 via max25d [devices], not kernel plugins.
