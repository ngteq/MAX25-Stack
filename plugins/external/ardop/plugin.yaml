id: ardop-plugin
type: optional
parent_stack: MainAX25-Stack (MAX25-Stack)
label: ARDOP-plugin
status: optional

note: |
  ARDOP-plugin is an optional MAX25-Stack plugin for ARDOP host wire mode.
  MAX25 ships CRDOP (MAX25-SoftModem) as the standard sound-card modem.
  Enable ARDOP-plugin mode with ardop_compat=true on soft-crdop (TCP :8515/:8516).

policy:
  max25_standard_modem: CRDOP
  ardop_plugin_mode: ardop_compat
  crdop_code_in_max25: true
  ardop_modem_binary_in_max25: false

attach:
  via_device: soft-crdop
  ini_flag: ardop_compat
  control_port: 8515
  data_port: 8516
  wire_format: ardop-host-tcp

standard_modem:
  product: MAX25-SoftModem
  device: soft-crdop
  stack: stacks/crdop
  protocol: max25-softmodem

docs:
  - plugins/external/README.md
  - plugins/external/ardop/README.md
  - docs/CRDOP.md
