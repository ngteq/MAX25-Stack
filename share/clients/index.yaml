# MAX25 modem database — client profile registry
# Maps modems.ini catalog IDs and MAX25 device plugins to terminal client configs.
# BayCom kernel catalog entries: baycom_ini_direct — hardware via baycom-pr.ini;
# share/clients/baycom-ser12.yaml is an operator reference (connection + pointers).

schema_version: 1
catalog_source: stacks/baycom-pr/config/modems.ini
plugin_registry: plugins/manifest.yaml

# --- MAX25 device plugins (always have or reference client YAML) ---

devices:
  - id: tnc2c
    label: Landolt TNC2C
    hardware: tncs
    client_config: share/clients/tnc2c.yaml
    baycom_ini_direct: false
    status: active

  - id: pktnc2
    label: PK-TNC2 / TNC-2 (TheFirmware)
    hardware: tncs
    client_config: share/clients/pktnc2.yaml
    baycom_ini_direct: false
    status: planned

  - id: baycom-ser12
    label: BayCom SER12 (kernel)
    hardware: modems
    client_config: share/clients/baycom-ser12.yaml
    baycom_ini_direct: true
    baycom_catalog: baycom-ser12
    note: Hardware via baycom-pr.ini; client YAML is operator reference only
    status: active

  - id: baycom-par96
    label: BayCom PAR96 (kernel LPT)
    hardware: modems
    client_config: null
    baycom_ini_direct: true
    baycom_catalog: baycom-par96
    status: scaffold

  - id: baycom-kiss
    label: BayCom KISS serial (USB/async)
    hardware: modems
    client_config: share/clients/baycom-kiss.yaml
    baycom_ini_direct: false
    baycom_catalog: kiss-serial-usb
    status: scaffold

  - id: soft-crdop
    label: CRDOP sound-card modem
    hardware: soft-modems
    client_config: share/clients/soft-crdop.yaml
    baycom_ini_direct: false
    status: active

