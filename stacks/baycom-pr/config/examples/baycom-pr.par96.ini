; BayCom PR-Stack — single par96 modem on LPT1 (parallel G3RUH 9600)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Install: sudo cp config/examples/baycom-pr.par96.ini /etc/baycom/baycom-pr.ini
;          edit iobase / callsign / txdelay
;          sudo baycom-pr-ctl preflight && sudo baycom-pr-ctl start
;
; Requires: CONFIG_PARPORT, CONFIG_BAYCOM_PAR, parport_pc module
; Interface: bcp0 (from baycom_par)
; No serial= or irq= — parport subsystem owns the LPT port

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = par96-single
modems = a

[modem.a]
catalog = baycom-par96
label = Par96 LPT1
iobase = 0x378
mode = par96
iface = bcp0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = radio
callsign = N0CALL-0
txdelay = 20
options = softdcd
