; Dual-modem — CB, HAM, or mixed (two independent ser12 UARTs)
; NOT FOR AX25SRV — on production edge nodes ttyS5 is PK-TNC2 (HyBBX packet_radio).
; AX25SRV uses one PC-COM on ttyS0 only: share/baycom/baycom-pr.pccom-ttyS0-only.ini.example
;
; Install: sudo cp config/examples/baycom-pr.dual.ini /etc/baycom/baycom-pr.ini
;          sudo baycom-pr-ctl probe && sudo baycom-pr-ctl setup
;          sudo /sbin/setserial -g /dev/ttyS0 /dev/ttyS5
;          sudo baycom-pr-ctl preflight && sudo baycom-pr-ctl start
;
; Service mode only — two modems, 24/7 (HyBBX / automation). See docs/GUIDE.md §11
; CB example ports: cb0/cb1 · HAM example: radio/radio2

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = dual
modems = a, b

[modem.a]
catalog = albrecht-pc-com
label = Radio A
serial = /dev/ttyS0
iface = bcsf0
kiss_link = /var/run/baycom-pr/kiss-a
ax25_port = cb0
callsign = N0CALL-0
txdelay = 35
iobase = 0x3f8
irq = 4

[modem.b]
catalog = albrecht-pc-com
label = Radio B
serial = /dev/ttyS5
iface = bcsf1
kiss_link = /var/run/baycom-pr/kiss-b
ax25_port = cb1
callsign = N0CALL-1
txdelay = 35
iobase = 0xe080
irq = 30

; Verify with: setserial -g /dev/ttyS0 /dev/ttyS5  (must match above)
; setup can fill these if omitted on a live host
