; BayCom PR-Stack — single CB packet modem (27 MHz, 1200 bd)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Install: sudo cp config/examples/baycom-pr.cb.ini /etc/baycom/baycom-pr.ini
;          sudo baycom-pr-ctl probe && sudo baycom-pr-ctl setup && sudo baycom-pr-ctl start
;
; See docs/GETTING-STARTED.md and docs/CONNECTS.md

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = cb-single
modems = a

[modem.a]
catalog = albrecht-pc-com-4500
label = CB Radio
serial = /dev/ttyS0
iface = bcsf0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = cb0
callsign = CB0CALL-0
txdelay = 35

; Generic CB kit: catalog = cb-ser12-generic, txdelay = 30
