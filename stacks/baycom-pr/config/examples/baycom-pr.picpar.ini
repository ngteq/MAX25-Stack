; BayCom PR-Stack — single picpar modem (DF9IC redesign, hardware DCD)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Install: sudo cp config/examples/baycom-pr.picpar.ini /etc/baycom/baycom-pr.ini
;          sudo baycom-pr-ctl preflight && sudo baycom-pr-ctl start
;
; picpar: protocol-compatible with par96; prefer hardware DCD from radio if wired.
; LPT2 example: iobase = 0x278

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = picpar-single
modems = a

[modem.a]
catalog = baycom-picpar
label = Picpar LPT1
iobase = 0x378
mode = picpar
iface = bcp0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = radio
callsign = N0CALL-0
txdelay = 20
