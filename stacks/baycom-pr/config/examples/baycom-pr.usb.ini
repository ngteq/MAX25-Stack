; BayCom PR-Stack — USB KISS modem (ttyUSB / ttyACM)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Use for PC-COM USB, Mobilinkd, KISS TNCs — NOT kernel ser12 on USB adapters.
; Install: sudo cp config/examples/baycom-pr.usb.ini /etc/baycom/baycom-pr.ini
;          sudo baycom-pr-ctl probe && sudo baycom-pr-ctl preflight && sudo baycom-pr-ctl start
;
; max25d: baycom-ser12 = baycom:a  (KISS PTY)  OR  pccom-kiss = /dev/ttyUSB0 (direct KISS)
; Do not run both paths on the same ttyUSB port.

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = kiss-usb-single
modems = a

[modem.a]
catalog = kiss-serial-usb
label = USB KISS Radio
serial = /dev/ttyUSB0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = radio
callsign = N0CALL-0
; No iobase/irq — kiss-serial backend (baycom_kiss_serial)
