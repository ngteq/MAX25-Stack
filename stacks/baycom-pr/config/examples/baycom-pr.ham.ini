; BayCom PR-Stack — single Amateur (HAM) packet modem (1200 bd ser12)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Install: sudo cp config/examples/baycom-pr.ham.ini /etc/baycom/baycom-pr.ini
;          sudo baycom-pr-ctl probe && sudo baycom-pr-ctl setup && sudo baycom-pr-ctl start
;
; See docs/GETTING-STARTED.md and docs/CONNECTS.md

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = ham-single
modems = a

[modem.a]
catalog = baycom-ser12
label = HAM Radio
serial = /dev/ttyS0
iface = bcsf0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = radio
callsign = N0CALL-0
txdelay = 25

; PC-COM / AE8000: catalog = albrecht-pc-com, txdelay = 35
