; =============================================================================
; NOT supported by BayCom PR-Stack (documented to avoid confusion)
; =============================================================================

[modem.unsupported-baycom-uscc]
name = BayCom 9k6 USCC card
kind = uscc
stack = unsupported
verification = n/a
driver = external
ref = TFPCX -PUSCC; SCC softclock/DF9IC — not UART ser12
notes = Use TFPCX/AX.25DRV or host-mode SCC stack, not baycom_ser_fdx.

[modem.unsupported-optopcscc]
name = PA0HZP OptoPcScc
kind = scc
stack = unsupported
verification = n/a
driver = external
ref = TFPCX -POSCC
notes = SCC-based; different driver stack.

[modem.unsupported-kiss-tnc]
name = (moved) use kiss-serial-usb or kiss-serial-rs232
kind = kiss
stack = unsupported
verification = n/a
driver = external
notes = Superseded by kiss-serial-* catalog entries in v0.5.0.

[modem.kiss-serial-usb]
name = KISS modem on USB (ttyUSB / ttyACM)
kind = kiss
stack = supported
verification = supported-by-design
driver = kiss_serial
backend = kiss-serial
kiss_baud = 9600
connector = USB
ref = Standard KISS TNCs, digipeaters, Mobilinkd-class devices
notes = FTDI, CH340, CP210x, CDC-ACM. baycom_kiss_serial. Adapter must supply stable USB power; port-powered TNCs need adequate RS-232 line drive — see docs/HARDWARE.md.
adapter_requires = 8N1 full-duplex async; kiss_baud match; stable USB power

[modem.kiss-serial-rs232]
name = KISS modem on RS-232 serial
kind = kiss
stack = supported
verification = supported-by-design
driver = kiss_serial
backend = kiss-serial
kiss_baud = 9600
connector = DE-9 / DB-25 async
notes = TNC2, OpenTracker, KISS firmware on RS-232 or USB-serial. Self-powered preferred; port-powered units need USB adapter with sufficient TXD/DTR current — docs/HARDWARE.md.
adapter_requires = 8N1 full-duplex; kiss_baud match; RS-232 levels if port-powered

[modem.unsupported-ser12-usb-adapter]
name = ser12 BayCom modem via USB–serial adapter only
kind = usb-serial
stack = unsupported
verification = n/a
driver = external
ref = baycom.rst — kernel ser12 bit-bang needs 8250-class UART at iobase/irq
notes = Not a kernel-ser12 path. Use hardware UART or kiss-serial-usb. If wired for bench test, USB adapter must meet TXD/DTR power in docs/HARDWARE.md.

[modem.unsupported-lpt-ser12]
name = LPT-wired ser12 (DigiCom-style)
kind = lpt-ser12
stack = unsupported
verification = n/a
driver = external
ref = TFPCX 3.1 LPT pinout — different from par96
notes = DATA7/8 PTT/RX on parallel port; DOS TFPCX only today.

; --- Standard ser12 DE-9 (PC side, BayCom / TFPCX) ---
; DTR  pin4  TX data ±12 V
; RTS  pin7  PTT (high = TX)
; CTS  pin8  RX data
; TXD  pin3  modem supply (+12 V pump)
; GND  pin5  ground
