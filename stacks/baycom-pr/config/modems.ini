; =============================================================================
; Parallel 9600 baud G3RUH (baycom_par)
; =============================================================================

[modem.baycom-par96]
name = BayCom par96 (parallel G3RUH 9600)
kind = par96
stack = supported
verification = supported-by-design
driver = baycom_par
backend = kernel-par96
mode = par96
baud = 9600
iobase = 0x378
iface_prefix = bcp
txdelay = 20
dcd = poor-software
pinout = par96-shift
ref = baycom.rst; baycom(9) man page
notes = Prefer hardware DCD from radio if wired. iobase typically 0x378 LPT1. options=softdcd in site INI.

[modem.baycom-picpar]
name = BayCom picpar / par97 (DF9IC)
kind = picpar
stack = supported
verification = supported-by-design
driver = baycom_par
backend = kernel-par96
mode = picpar
baud = 9600
iobase = 0x378
iface_prefix = bcp
txdelay = 20
dcd = hardware
pinout = par96-shift
ref = DF9IC redesign; baycom.rst
notes = Built-in DCD recommended. Protocol-compatible with par96.

[modem.baypac-bp96a]
name = Tigertronics BayPac BP-96A (parallel 9600)
kind = par96
stack = supported
verification = supported-by-design
driver = baycom_par
backend = kernel-par96
mode = par96
baud = 9600
iobase = 0x378
iface_prefix = bcp
txdelay = 20
dcd = poor-software
pinout = par96-shift
connector = DE-25 parallel
ref = tigertronics.com/baysuprt.htm
notes = G3RUH 9600. Maps to par96 driver, not ser12.

