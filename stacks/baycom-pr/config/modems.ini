; BayCom PR-Stack — modem hardware catalog (v0.5.0)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Site instances in baycom-pr.ini:  catalog = <id>   (without "modem." prefix)
;
; Fields used by baycom_ini_load.py: driver, mode, baud, txdelay
; Optional overrides: mode_alt, baud_alt (documented; set manually in baycom-pr.ini)
; verification: offline-verified | supported-by-design | planned | n/a
;
; stack: supported | planned | unsupported
; pinout: baycom-de9 | baycom-de25 | lpt-baycom | par96-shift
; dcd: software | hardware | poor-software
;
; Kernel: Documentation/networking/device_drivers/hamradio/baycom.rst
; DOS:    TFPCX 2.10 (DG0FT) — BayCom-compatible modems without modification

; =============================================================================
; ser12 — 1200 baud Bell 202 AFSK, UART bit-bang (baycom_ser_fdx / baycom_ser_hdx)
; =============================================================================

[modem.baycom-ser12]
name = BayCom ser12 (original DIY, TCM3105)
kind = ser12
stack = supported
verification = supported-by-design
driver = baycom_ser_fdx
mode = ser12*
baud = 1200
txdelay = 20
chip = TCM3105
pinout = baycom-de9
dcd = software
connector = DE-9 to radio DIN
ref = SM0VPO/DL8MBT design; nagano.cz packet/baycom/anst.htm
notes = Reference ser12. Squelch open recommended with ser12*. Align RX level per build doc.

[modem.albrecht-pc-com]
name = Albrecht PC-COM / AE8000 internal
kind = ser12
stack = supported
verification = offline-verified
driver = baycom_ser_fdx
mode = ser12*
baud = 1200
txdelay = 35
chip = TCM3105
pinout = baycom-de9
dcd = software
connector = DE-9 pass-through
ref = Albrecht manual; TFPCX BayCom-compatible
notes = Verified on reference station. 350 ms TX delay typical for AE8000.

[modem.albrecht-pc-com-4500]
name = Albrecht PC-COM 4500 (CB standalone)
kind = ser12
stack = supported
verification = supported-by-design
driver = baycom_ser_fdx
mode = ser12*
baud = 1200
txdelay = 35
chip = TCM3105
pinout = baycom-de9
dcd = software
connector = DE-9
ref = pmr-funkgeraete.de product docs
notes = Same L1 protocol as PC-COM / BayCom.

