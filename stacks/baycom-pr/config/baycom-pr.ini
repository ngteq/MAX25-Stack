; BayCom PR-Stack — site configuration (default: single modem)
; SPDX-License-Identifier: GPL-3.0-or-later
;
; Install: /etc/baycom/baycom-pr.ini
;
; Minimal setup (recommended):
;   sudo baycom-pr-ctl probe          # scan hardware
;   sudo baycom-pr-ctl setup          # auto-fill iobase/irq from probe
;   sudo baycom-pr-ctl preflight      # safety check
;   sudo baycom-pr-ctl start
;
; iobase/irq are optional for ser12 — filled from setserial if omitted.
; Catalog IDs: config/modems.ini (baycom-ser12, albrecht-pc-com, kiss-serial-usb, …)

[stack]
state_dir = /var/run/baycom-pr
kiss_bridge = yes
catalog = /etc/baycom/modems.ini
bindir = /usr/local/sbin

[profile]
name = single
modems = a

[modem.a]
catalog = albrecht-pc-com
label = Radio
serial = /dev/ttyS0
iface = bcsf0
kiss_link = /var/run/baycom-pr/kiss
ax25_port = radio
callsign = N0CALL-0
txdelay = 35

; Optional — auto-detected via setserial / baycom-pr-ctl setup:
; iobase = 0x3f8
; irq = 4

; --- USB KISS — replace [modem.a] block above ---
;
; [modem.a]
; catalog = kiss-serial-usb
; label = USB KISS TNC
; serial = /dev/ttyUSB0
; kiss_baud = 9600
; kiss_link = /var/run/baycom-pr/kiss
; ax25_port = radio
; callsign = N0CALL-0
