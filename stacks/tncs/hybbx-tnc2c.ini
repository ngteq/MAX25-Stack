; HyBBX local — TNC2C Landolt, CB Kanal 24 (27,235 MHz)
; Stand: 2026-07-10 — aligned with production /usr/local/hybbx/hybbx.ini

[service]
name = hyBBX-tnc2c

[storage]
backend = flatfile
path = data

[auth]
auto_login = yes
guest_prefix = Guest

[traffic]
baud = 2400
line_width = 80

[networks]
ax25 = yes
circuit = yes

[transport.telnet]
enabled = yes
bind = 127.0.0.1
port = 2323

[circuit]
enabled = yes
bind = 127.0.0.1
port = 7323
link_auth = yes
link_password = changeme

[transport.packet_radio]
enabled = yes
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4

; Host — TERM-Brücke 19200
baud = 19200
serial_line = 8n1
rts_dtr = yes
kiss_entry = kiss_on
kiss_exit = kiss_off

; Funk — TCM3105 2400 Baud AFSK, CB K24
modem = tcm3105
radio_baud = 2400
clock_mhz = 4.9
radio_band = cb
radio_duplex = half
modulation = afsk
g3ruh_fsk = no
frequency_mhz = 27.235

kiss_on_startup = yes
txdelay = 50
persist = 128
slot = 10
txtail = 0

circuit_host = 127.0.0.1
circuit_port = 7323
; RF-TX über Circuit-Hub braucht LINK_AUTH (sonst kein Downlink zum TNC)
link_id = packet-radio1
link_password = changeme
link_role = link
mycall = UN1TME
dest = QST

[broadcast]
enabled = yes
ax25 = yes
ax25_mycall = UN1TME
ax25_dest = QST
