; TNCs-Stack — HyBBX Secondary host (TNC2C / packet_radio)
; Canonical shipped copy: share/hybbx/tnc2c-host.ini.example
; Merge into HyBBX hybbx.ini on Secondary node.
; Prerequisite: ./scripts/max25-ctl start --hardware tncs --device tnc2c
;
; Example onboard layout: TNC2C on /dev/ttyS4 (ttyS0 = BayCom, ttyS5 = PK-TNC2).
; USB Linux hosts: set device = /dev/ttyUSB0 or /dev/serial/by-id/...

[networks]
ax25 = yes

[transport.packet_radio1]
enabled = yes
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4
baud = 19200
serial_line = 8n1
rts_dtr = yes
kiss_on_startup = yes
modem = tcm3105
radio_baud = 2400
clock_mhz = 4.9
radio_band = cb
radio_duplex = half
frequency_mhz = 27.235
txdelay = 50
persist = 128
slot = 10
circuit_host = main.example.com
circuit_port = 7323
link_id = max25-tnc2c
link_password = changeme
mycall = CB-0
