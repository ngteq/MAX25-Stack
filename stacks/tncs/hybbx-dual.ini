; TNCs-Stack — HyBBX service mode dual TNC (packet_radio)
; For two serial TNCs on unique UARTs. Do not use when BayCom already owns ttyS0.
; Prerequisite: max25d [devices] with tnc2c + pktnc2, boot-wait per port.
; BayCom dual-radio HyBBX: share/hybbx/service-dual.ini.example instead.
;
; Example (both TNCs active, no BayCom on ttyS0):
;   tnc2c  → /dev/ttyS4
;   pktnc2 → /dev/ttyS5

[networks]
ax25 = yes

[transport.packet_radio1]
enabled = yes
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4
baud = 19200
serial_line = 8n1
rts_dtr = yes
kiss_on_startup = yes
modem = tcm3105
radio_baud = 2400
radio_band = cb
frequency_mhz = 27.235
txdelay = 50
persist = 128
slot = 10
circuit_host = main.example.com
circuit_port = 7323
link_id = max25-tnc2c
link_password = changeme
mycall = CB-0

[transport.packet_radio2]
enabled = yes
tnc = pktnc2
protocol = kiss
device_type = serial
device = /dev/ttyS5
baud = 9600
serial_line = 8n1
rts_dtr = no
kiss_on_startup = yes
modem = tcm3105
radio_baud = 1200
radio_band = cb
frequency_mhz = 27.205
txdelay = 50
persist = 128
slot = 10
circuit_host = main.example.com
circuit_port = 7323
link_id = max25-pktnc2
link_password = changeme
mycall = CB-1
