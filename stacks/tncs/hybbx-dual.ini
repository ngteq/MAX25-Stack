; HyBBX — Dual TNC auf AX25SRV (Main, standalone)
; Basis: /usr/local/hybbx/hybbx.ini (2026-07-11)
;
; Unit A: Landolt TNC2C  → /dev/ttyS4  Host 19200 8N1  Funk 2400  K24 27,235 MHz
; Unit B: PK-TNC2 + Stabo → /dev/ttyS5  Host 9600 8N1   Funk 1200  K25 27,245 MHz
;
; Install: sudo cp hybbx-dual.ini /usr/local/hybbx/hybbx.ini
; Start:   boot-wait BEIDE TNCs, dann hybbx-start (siehe docs/HYBBX-DUAL.md)

[service]
name = UN1TME

[time]
clock = 24h
seconds = no
date = iso

[storage]
backend = sqlite
path = data
user_db = users.db
mail_db = mail.db
backup_interval = 300
backup_path = data

[auth]
auto_login = yes
guest_prefix = Guest

[crypto]
password_hash = openssl
aes_gcm = openssl
random = openssl

[traffic]
baud = 2400
line_width = 80
pace_output = yes
ansi = no
input_echo = no

[texts]
path = text

[log]
enabled = yes
level = stats

[security]
enabled = yes
maxretry = 5
findtime = 600
bantime = 600
abuse_maxretry = 30
abuse_findtime = 600
telnet = yes
ssh = yes
websocket = yes
circuit = yes
rate_limit = 30
rate_window = 60
ban_backend = internal

[chat]
channels = 10
message_max = 72
channel1 = Channel1
channel2 = Channel2
channel3 = Channel3
channel4 = Channel4
channel5 = Channel5
channel6 = Channel6
channel7 = Channel7
channel8 = Channel8
channel9 = Channel9
channel10 = Channel10

[mail]
enabled = yes
max_messages = 50
subject_max = 72
body_max = 2048
recycle_days = 10
path = mail

[networks]
ax25 = yes
baycom = yes
ardop = no
crdop = no
ssh = yes
websocket = yes
circuit = yes
mains_proxy = no

[transport.telnet]
bind = 0.0.0.0
bind6 = ::
port = 2323
ipv4 = yes
ipv6 = yes

[transport.ssh]
enabled = yes
bind = 0.0.0.0
bind6 = ::
port = 3232
ipv4 = yes
ipv6 = yes
hostkey_dir = keys

[transport.websocket]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 4591
path = /hybbx
cert_dir = keys
max_connections = 10
ipv4 = yes
ipv6 = yes

[circuit]
enabled = yes
bind = 127.0.0.1
bind6 = ::1
port = 7323
ipv4 = yes
ipv6 = yes
link_auth = yes
link_password = changeme
link_stale_days = 10
max_links = 8
balance = yes
balance_lag_sec = 5
balance_queue_pause = 4096
balance_queue_break = 16384
balance_queue_cancel = 65536

[broadcast]
enabled = yes
ax25 = yes
ax25_auto = yes
ax25_auto_interval = 300
; 150 s offset between K24 and K25 so both never TX at once (see docs/HYBBX-DUAL.md)
ax25_auto_stagger = 150
ax25_auto_message = Broadcast: @service@ online
ax25_mycall = UN1TME
ax25_dest = *

[ax25]
frequency1 = 27.235
frequency1_label = Kabel24
frequency2 = 27.245
frequency2_label = Kabel25

; --- Unit A: TNC2C (bestätigt) ---
[transport.packet_radio1]
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4
baud = 19200
serial_line = 8n1
rts_dtr = yes
kiss_entry = kiss_on
kiss_exit = kiss_off
radio_band = cb
radio_duplex = half
modulation = afsk
g3ruh_fsk = no
modem = tcm3105
radio_baud = 2400
clock_mhz = 4.9
frequency_mhz = 27.235
kiss_on_startup = yes
txdelay = 50
persist = 128
slot = 10
txtail = 0
link_id = packet-radio1
link_password = changeme
link_role = link
mycall = UN1TME

; --- Unit B: PK-TNC2 + Stabo XM6012 (K25, 1200 AFSK) ---
[transport.packet_radio2]
tnc = tnc2
protocol = kiss
device_type = serial
device = /dev/ttyS5
baud = 9600
serial_line = 8n1
rts_dtr = yes
kiss_entry = auto
kiss_exit = auto
radio_band = cb
radio_duplex = half
modulation = afsk
g3ruh_fsk = no
radio_baud = 1200
frequency_mhz = 27.245
kiss_on_startup = yes
txdelay = 30
persist = 63
slot = 10
txtail = 0
link_id = packet-radio2
link_password = changeme
link_role = link
mycall = UN1TME-2
