; HyBBX 1.7.5 — TNC2C auf /dev/ttyS4, CB Kanal 24 (27,235 MHz)
; Produktions-Snippet für /usr/local/hybbx/hybbx.ini
; Stand: 2026-07-10 — erfolgreich gestartet und geloggt

[networks]
ax25 = yes

[transport.packet_radio1]
tnc = tnc2c
protocol = kiss
device_type = serial
device = /dev/ttyS4

; Host (Terminal) — TERM-Brücke 19200; dieses Gerät: 8N1 (nicht 7E1)
baud = 19200
serial_line = 8n1
rts_dtr = yes
kiss_entry = kiss_on
kiss_exit = kiss_off

; Funk (CB Kabel 24) — TCM3105 2400 Baud AFSK
radio_band = cb
radio_duplex = half
modulation = afsk
g3ruh_fsk = no
modem = tcm3105
radio_baud = 2400
clock_mhz = 4.9

; Betriebsfrequenz — Funkgerät manuell auf Kanal 24
frequency_mhz = 27.235

; KISS / AX.25 Timing (CB halbduplex)
kiss_on_startup = yes
txdelay = 50
persist = 128
slot = 10
txtail = 0

; Optional: eigene CB-Kennung (max. 9 Zeichen AX.25)
; mycall = DEINCALL

; Optional: AX.25-Frequenzliste für UI
; [ax25]
; frequency1 = 27.235
; frequency1_label = CB K24 Kabel
