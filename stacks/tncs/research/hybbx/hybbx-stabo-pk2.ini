; HyBBX — Stabo XM6012 + PK-TNC2 (Unit B)
; Stand: 2026-07-10 — VORLAGE, ungetestet bis Hardware da ist
; Siehe research/tnc2c/ebay-227405716803.md

[transport.packet_radio2]
enabled = yes
tnc = tnc2
protocol = kiss
device_type = serial
device = /dev/ttyUSB0          ; anpassen nach Inventar!

; Host — PK-TNC2 / TheFirmware TF2.7 (typ. 9600 8N1)
baud = 9600
serial_line = 8n1
rts_dtr = no
kiss_entry = auto
kiss_exit = auto
kiss_on_startup = yes

; Funk — 1200 baud AFSK (Standard PK-TNC2, CB FM)
radio_band = cb
radio_duplex = half
modulation = afsk
g3ruh_fsk = no
radio_baud = 1200
frequency_mhz = 27.235

txdelay = 30
persist = 63
slot = 10
txtail = 0

link_id = cb1200-stabo
mycall = TEST

; NICHT mit Unit A (TNC2C /dev/ttyS4) gleichzeitig auf demselben device!
